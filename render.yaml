# Render Blueprint: deploy the routing agent dashboard as a Docker web service.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: routing-agent
    runtime: docker
    plan: free            # upgrade to "standard" (2GB RAM) for Gemma 3 1B comfortably
    healthCheckPath: /health
    envVars:
      - key: FIREWORKS_API_KEY
        sync: false        # set in the Render dashboard, never committed
      - key: PORT
        value: "8000"
      # Free tier (512MB RAM) cannot hold the local model, so MODEL_URL is off
      # by default and the service runs remote-only. On a Standard instance,
      # uncomment MODEL_URL to enable free local routing with Gemma 3 1B
      # (~800MB GGUF from the public ggml-org mirror; Google's repo is gated).
      # - key: MODEL_URL
      #   value: "https://huggingface.co/ggml-org/gemma-3-1b-it-GGUF/resolve/main/gemma-3-1b-it-Q4_K_M.gguf"
      - key: MODEL_PATH
        value: "models/gemma-3-1b-it-q4_0.gguf"
      - key: ROUTING_AGENT_CONFIG
        value: "config.yaml"
