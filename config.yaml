# Hybrid Token-Efficient Routing Agent configuration.
# Everything launch-day-dependent (model IDs, thresholds) lives here.

local:
  enabled: true
  # GGUF model path. Download example (Gemma 3 1B instruct, Q4_0 QAT):
  #   huggingface-cli download google/gemma-3-1b-it-qat-q4_0-gguf gemma-3-1b-it-q4_0.gguf --local-dir models/
  model_path: "models/gemma-3-1b-it-q4_0.gguf"
  n_ctx: 4096
  n_threads: 0            # 0 = auto
  max_tokens: 512
  # Short-answer types get tight caps so generations finish fast; math keeps
  # room for chain-of-thought (local tokens are free, but time is not).
  # Generation time is linear in max_tokens on CPU; caps tuned for latency.
  max_tokens_by_type:
    qa: 96
    mcq: 96
    sentiment: 96
    extraction: 160
    summary: 160
    math: 256
    logic: 288
    general: 160
  temperature: 0.2
  retry_temperature: 0.8  # rung 2 uses a hotter retry

remote:
  # NOTE: at evaluation time the judging harness injects FIREWORKS_BASE_URL
  # and ALLOWED_MODELS environment variables, and those ALWAYS override the
  # values below (see config.py). The YAML values are local-dev defaults.
  base_url: "https://api.fireworks.ai/inference/v1"
  # Tiered escalation: cheap first, strong as last resort.
  # NOTE: placeholders from today's account catalog - swap in the model IDs
  # revealed at kickoff. gpt-oss emits hidden reasoning tokens, hence the
  # larger judge cap.
  # Defaults point at models actually deployed on the account; the judging
  # harness overrides these via ALLOWED_MODELS. gpt-oss are reasoning models,
  # so caps must leave room for hidden reasoning *plus* the final answer or the
  # content channel comes back empty (finish_reason=length).
  cheap_model: "accounts/fireworks/models/gpt-oss-20b"
  strong_model: "accounts/fireworks/models/gpt-oss-120b"
  judge_model: "accounts/fireworks/models/gpt-oss-20b"
  max_tokens_cheap: 512
  max_tokens_strong: 1024
  max_tokens_judge: 256
  timeout_seconds: 60
  max_retries: 3
  # gpt-oss burns hidden reasoning tokens on every call; low effort keeps
  # verdicts and short answers cheap. Harmless for models that ignore it.
  extra_params:
    reasoning_effort: "low"

ladder:
  # Measured on Gemma 3 1B (2026-07-05): at 0.72 the 1B model ships everything
  # rung-1 including wrong answers (67% acc, 0 tok); at 0.98 shaky answers
  # escalate (75% acc, ~1k tok over 12 tasks). Re-sweep on launch-day tasks.
  # NOTE: local logprobs are disabled for prefill speed (see clients/local.py),
  # so confidence is a neutral 0.5 and rungs 1-2 never ship on it - the
  # verifier + quorum vote + judge are the trust chain.
  confidence_threshold: 0.98
  self_consistency_k: 5        # rung 3 sample count (includes rungs 1-2 answers)
  early_consensus_quorum: 2    # unanimous after N samples -> stop sampling (latency)
  unanimous_ratio: 1.0         # vote ratio that ships without judge
  contested_ratio: 0.6         # vote ratio at/above which the remote judge arbitrates
  skip_ahead_difficulty: 0.85  # rung 0 difficulty above this jumps straight to remote
  per_task_token_budget: 2000  # hard cap on remote tokens per task
  wall_clock_cap_seconds: 120  # practicality cap; latency is not scored
  judge_enabled: true

cache:
  enabled: true
  db_path: "data/cache.db"
  semantic_threshold: 0.95
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"

learned_router:
  enabled: false               # flips to true once trained model beats heuristics
  model_path: "data/router_model.joblib"
  min_probability_local: 0.5
  training_log_path: "data/training_records.jsonl"

decomposer:
  enabled: false               # kill-switch; enable per eval A/B results
  max_subtasks: 4
  max_depth: 1

web:
  host: "0.0.0.0"
  port: 8000
  demo_mode: false             # true = cap generation lengths for snappy demos
  demo_max_tokens: 128
